[smtp]
# SMTP 服务器地址，例如 smtp.gmail.com / smtp.qq.com
host = smtp.example.com
# 常见端口：587(STARTTLS) / 465(SSL)
port = 587
username = your_email@example.com
password = your_smtp_app_password
# 可选，默认同 username
from_email = your_email@example.com
# 是否启用 STARTTLS（常用于 587）
use_tls = true
# 是否使用 SSL 直连（常用于 465）
use_ssl = false
